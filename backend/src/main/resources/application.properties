spring.application.name=AI-Augmented-RAG-System
spring.profiles.active=dev

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (H2 for development)
spring.datasource.url=jdbc:h2:mem:ragdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# OpenAI Configuration (update with your API key)
openai.api.key=${OPENAI_API_KEY:}
openai.api.model=gpt-4

# Pinecone Configuration (optional)
pinecone.api.key=${PINECONE_API_KEY:}
pinecone.environment=${PINECONE_ENV:}

# Document Upload Configuration
upload.directory=/tmp/ai-augmented-uploads
upload.max-size=50MB

# Logging
logging.level.root=INFO
logging.level.com.ai.augmented=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
